name: Deploy

on:
  push:
    branches: [main]

env:
  AWS_DEFAULT_REGION: us-east-1

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Install requests into the Lambda source dir so it gets zipped up by Terraform
      - name: Install Lambda dependencies
        run: pip install -r lambdas/ingestion/requirements.txt -t lambdas/ingestion/

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"
          terraform_wrapper: false

      # Bootstrap the S3 bucket used to store Terraform state (idempotent — safe to re-run)
      - name: Bootstrap Terraform state bucket
        run: |
          ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          BUCKET="stock-mover-tfstate-${ACCOUNT}"
          aws s3 mb "s3://${BUCKET}" --region us-east-1 2>/dev/null || true
          aws s3api put-bucket-versioning \
            --bucket "${BUCKET}" \
            --versioning-configuration Status=Enabled
          echo "TF_STATE_BUCKET=${BUCKET}" >> "$GITHUB_ENV"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="region=us-east-1"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve -var="stock_api_key=${{ secrets.STOCK_API_KEY }}"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      # Upload the dashboard HTML after infrastructure is confirmed up-to-date
      - name: Deploy frontend to S3
        working-directory: terraform
        run: |
          BUCKET=$(terraform output -raw bucket_name)
          aws s3 cp ../frontend/index.html "s3://${BUCKET}/index.html"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
